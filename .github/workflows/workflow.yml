name: Publish Package

# Version-routed release via PyPI Trusted Publishing (OIDC — no stored API tokens).
#   Tag  vX.Y.Z            → PyPI            (final release)
#   Tag  vX.Y.Z(-rcN|.devN|-*) → TestPyPI    (pre-release / dev)
# One-time setup (per package, done on the PyPI websites — see the
# `publishing-and-docs` skill): register this repo+workflow as a Trusted
# Publisher on pypi.org AND test.pypi.org, and create GitHub environments
# `pypi` and `testpypi`.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # REQUIRED for OIDC trusted publishing

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install
        run: uv sync --all-extras --dev
      - name: Test
        run: uv run pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && (contains(github.ref, '-') || contains(github.ref, '.dev'))
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/resoluto-sandbox
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') && !contains(github.ref, '.dev')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/resoluto-sandbox
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
