name: Publish Base Image

# Publishes the SUBSTRATE image (python, docker-ce, node, tini, overlay2, pam_limits, lane user,
# entrypoint) to Docker Hub, so downstream overlays — resoluto-engine's lane image, or any user's
# own Dockerfile — can build `FROM` it with NO checkout of this repo.
#
#   Tag v X.Y.Z  →  docker.io/<namespace>/resoluto-sandbox-base:X.Y.Z
#
# The tag is the WHEEL VERSION on purpose: `resoluto.sandbox.images.image_tags()` derives the base
# tag from the installed wheel, and the in-guest `assert_image_matches_wheel` drift guard refuses an
# image whose baked version doesn't match. Tag == wheel version is what makes both resolve.
#
# One-time setup (owner):
#   - repo variable  DOCKERHUB_NAMESPACE  (defaults to dbcjuanma while testing)
#   - repo secrets   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN  (a Docker Hub access token)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build + push base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          platforms: linux/amd64
          tags: docker.io/${{ vars.DOCKERHUB_NAMESPACE || 'dbcjuanma' }}/resoluto-sandbox-base:${{ steps.ver.outputs.version }}
          labels: resoluto.wheel_version=${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
