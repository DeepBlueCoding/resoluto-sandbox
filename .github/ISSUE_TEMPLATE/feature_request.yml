name: Feature request
description: Suggest an enhancement for resoluto-sandbox
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an improvement. Please describe the problem before the solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that resoluto-sandbox makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? API sketch, CLI flag, or behavior change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've weighed, and why they fall short.
    validations:
      required: false
